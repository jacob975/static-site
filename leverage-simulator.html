		.gradio-loader-inner {

		.gradio-loader-track {
			height: 6px;
			border-radius: 999px;
			background: #e6ebf2;
			overflow: hidden;
		}
		.gradio-loader-bar {
			height: 100%;
			width: 38%;
			border-radius: 999px;
			background: #1f6feb;
			animation: gradioLoad 1.25s ease-in-out infinite;
		}
		@keyframes gradioLoad {
			0% {
				transform: translateX(-120%);
			}
			50% {

<script>
	(function () {
		const app = document.getElementById("leverage-gradio-app");
		const loader = document.getElementById("gradio-loader");
		if (!app || !loader) {
			return;
		}

		let settled = false;
		const hideLoader = function () {
			if (settled) {
				return;
			}
			settled = true;
			loader.hidden = true;
			setTimeout(function () {
				loader.style.display = "none";
			}, 260);
		};

		const suppressStatusText = function () {
			const root = app.shadowRoot;
			if (!root) {
				return;
			}
			const nodes = root.querySelectorAll("*");
			nodes.forEach(function (el) {
				if (/Could not get space status/i.test((el.textContent || "").trim())) {
					el.style.display = "none";
				}
			});
		};

		["load", "render", "ready"].forEach(function (eventName) {
			app.addEventListener(eventName, hideLoader, { once: true });
		});

		const observer = new MutationObserver(function () {
			suppressStatusText();
			const root = app.shadowRoot;
			if (!root) {
				return;
			}
			if (root.querySelector("iframe, .gradio-container, [data-testid='block-root']")) {
				hideLoader();
			}
		});

		observer.observe(app, { childList: true, subtree: true });

		const statusTimer = setInterval(function () {
			suppressStatusText();
			if (settled) {
				clearInterval(statusTimer);
			}
		}, 250);

		setTimeout(hideLoader, 15000);
	})();
</script>
